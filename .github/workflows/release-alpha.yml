name: Alpha Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: frontend/.next
          include-hidden-files: true
          if-no-files-found: error

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/python/requirements.txt
            backend/python/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m ruff check .
      - run: python -m pytest

  java:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B test
      - run: mvn -B package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: java-api-jar
          path: backend/java/target/*.jar
          if-no-files-found: error

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - frontend
      - python
      - java
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config -q
      - run: scripts/docker-compose-smoke.sh
        env:
          COMPOSE_SMOKE_KEEP_RUNNING: "true"
      - run: scripts/export-openapi-artifacts.sh "${GITHUB_REF_NAME#v}"
      - if: always()
        run: docker compose down --remove-orphans
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-release-artifacts
          path: artifacts/*.json
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          files: artifacts/*.json
          body: |
            v0.9.1-alpha.1 is a patch release focused on stabilizing the v0.9.0-alpha.1 release hardening work. It fixes CI release workflow issues, Docker Compose smoke check readiness, OpenAPI artifact export reliability, frontend health dashboard fallback states, live trading safety validation edge cases, Playwright smoke test flakiness, Java/Python contract test setup, demo mode labeling consistency, and release runbook/checklist inaccuracies.

            Real order submission remains disabled by default. This release does not certify production live trading.
