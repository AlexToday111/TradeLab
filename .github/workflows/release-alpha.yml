name: Alpha Release

on:
  push:
    tags:
      - "v*"

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: frontend/.next
          include-hidden-files: true
          if-no-files-found: error

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/python/requirements.txt
            backend/python/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m ruff check .
      - run: python -m pytest

  java:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B test
      - run: mvn -B package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: java-api-jar
          path: backend/java/target/*.jar
          if-no-files-found: error

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - frontend
      - python
      - java
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config -q
      - run: scripts/docker-compose-smoke.sh
      - run: scripts/export-openapi-artifacts.sh "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-release-artifacts
          path: artifacts/*.json
          if-no-files-found: error
