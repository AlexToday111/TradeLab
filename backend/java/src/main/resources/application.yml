python:
  parser:
    base-url: http://127.0.0.1:8000
    timeout: 30

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tradelab
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect