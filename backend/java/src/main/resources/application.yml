server:
  port: 8080

spring:
  application:
    name: tradelab-java
  sql:
    init:
      mode: always
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:55432/tradelab}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: method
      tags-sorter: alpha

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  default-chat-id: ${TELEGRAM_CHAT_ID:}

app:
  strategy-storage-path: ./storage/strategies

execution:
  jobs:
    worker-enabled: ${EXECUTION_JOBS_WORKER_ENABLED:true}
    poll-fixed-delay-ms: ${EXECUTION_JOBS_POLL_FIXED_DELAY_MS:1000}
    max-parallel-jobs: ${EXECUTION_JOBS_MAX_PARALLEL_JOBS:1}
    max-attempts: ${EXECUTION_JOBS_MAX_ATTEMPTS:3}
    max-execution-duration-ms: ${EXECUTION_JOBS_MAX_EXECUTION_DURATION_MS:0}
    worker-id: ${EXECUTION_JOBS_WORKER_ID:}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:change-me-tradelab-jwt-secret-please-change}
    expiration-hours: ${SECURITY_JWT_EXPIRATION_HOURS:24}

python:
  parser:
    base-url: ${PYTHON_PARSER_BASE_URL:http://127.0.0.1:8000}
    internal-secret: ${PYTHON_PARSER_INTERNAL_SECRET:change-me-parser-internal-secret}
  backtest:
    executable: ${PYTHON_BACKTEST_EXECUTABLE:python}
    script: ${PYTHON_BACKTEST_SCRIPT:../python/backtesting/run_backtest.py}

live:
  trading:
    real-order-submission-enabled: ${LIVE_TRADING_REAL_ORDER_SUBMISSION_ENABLED:false}
    credential-encryption-key: ${LIVE_TRADING_CREDENTIAL_ENCRYPTION_KEY:change-me-live-credential-encryption-key}
    default-max-order-notional: ${LIVE_TRADING_DEFAULT_MAX_ORDER_NOTIONAL:100.00000000}
    default-max-position-notional: ${LIVE_TRADING_DEFAULT_MAX_POSITION_NOTIONAL:500.00000000}
    default-max-daily-notional: ${LIVE_TRADING_DEFAULT_MAX_DAILY_NOTIONAL:1000.00000000}
    max-failed-orders-before-circuit-breaker: ${LIVE_TRADING_MAX_FAILED_ORDERS_BEFORE_CIRCUIT_BREAKER:3}
    max-rejected-orders-before-circuit-breaker: ${LIVE_TRADING_MAX_REJECTED_ORDERS_BEFORE_CIRCUIT_BREAKER:10}
    binance:
      base-url: ${LIVE_BINANCE_BASE_URL:https://api.binance.com}
      testnet-base-url: ${LIVE_BINANCE_TESTNET_BASE_URL:https://testnet.binance.vision}
