server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p logger=%logger correlationId=%X{correlationId:-} runId=%X{runId:-} message=%m%n"

spring:
  sql:
    init:
      mode: always
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:55432/tradelab}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: method
      tags-sorter: alpha

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  default-chat-id: ${TELEGRAM_CHAT_ID:}

app:
  strategy-storage-path: ./storage/strategies

python:
  parser:
    base-url: ${PYTHON_PARSER_BASE_URL:http://127.0.0.1:8000}
  backtest:
    executable: ${PYTHON_BACKTEST_EXECUTABLE:python}
    script: ${PYTHON_BACKTEST_SCRIPT:../python/backtesting/run_backtest.py}
