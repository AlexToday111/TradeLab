services:
  postgres:
    image: postgres:16
    container_name: tradelab-postgres
    environment:
      POSTGRES_DB: tradelab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradelab"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-parser:
    build:
      context: ./backend/python
    container_name: tradelab-python
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tradelab
      DB_USER: postgres
      DB_PASSWORD: postgres
      BINANCE_BASE_URL: https://api.binance.com
      BINANCE_API_KEY: ""
      BINANCE_API_SECRET: ""
      PYTHON_SERVICE_PORT: 8000
    ports:
      - "${PYTHON_PARSER_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - strategy_storage:/app/storage/strategies
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  java-api:
    build:
      context: ./backend/java
    container_name: tradelab-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tradelab
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PYTHON_PARSER_BASE_URL: http://python-parser:8000
      LIVE_TRADING_REAL_ORDER_SUBMISSION_ENABLED: "false"
      LIVE_TRADING_CREDENTIAL_ENCRYPTION_KEY: ${LIVE_TRADING_CREDENTIAL_ENCRYPTION_KEY:-change-me-live-credential-encryption-key}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${JAVA_API_HOST_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-parser:
        condition: service_healthy
    volumes:
      - strategy_storage:/app/storage/strategies
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18

  frontend:
    build:
      context: ./frontend
    container_name: tradelab-frontend
    environment:
      BACKEND_API_BASE_URL: http://java-api:8080
      NODE_ENV: production
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      java-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  strategy_storage:
