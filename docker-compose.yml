services:
  postgres:
    image: postgres:16
    container_name: tradelab-postgres
    environment:
      POSTGRES_DB: tradelab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  python-parser:
    build:
      context: ./backend/python
    container_name: tradelab-python
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tradelab
      DB_USER: postgres
      DB_PASSWORD: postgres
      BINANCE_BASE_URL: https://api.binance.com
      BINANCE_API_KEY: ""
      BINANCE_API_SECRET: ""
      PYTHON_SERVICE_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  java-api:
    build:
      context: ./backend/java
    container_name: tradelab-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tradelab
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PYTHON_PARSER_BASE_URL: http://python-parser:8000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - python-parser

volumes:
  postgres_data: